name: Panel Baseline Audit

on:
  workflow_dispatch:

jobs:
  baseline-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run app routing audit
        run: node scripts/audit/generate-baseline-lock.mjs

      - name: Upload generated audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oddengine-baseline-audit
          path: |
            docs/generated/baseline-lock-manifest.json
            docs/generated/baseline-lock-panel-files.json
            docs/generated/baseline-lock-app-registry.json
            docs/generated/baseline-lock-app-loadable-ids.json
            docs/generated/baseline-lock-brain-raw-ids.json
            docs/generated/baseline-lock-brain-public-ids.json
            docs/generated/baseline-lock-trading-status.json
            docs/generated/baseline-lock-report.md
          retention-days: 14
