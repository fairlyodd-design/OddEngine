<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Homie Companion</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data: file:; img-src 'self' data: file: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https: file:;" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Segoe UI, Arial, sans-serif;
        color: #ecf4ff;
        background: radial-gradient(circle at top right, rgba(110,231,255,0.16), transparent 34%), radial-gradient(circle at bottom left, rgba(168,85,247,0.14), transparent 28%), linear-gradient(180deg, #0b1120, #090d17);
      }
      .shell { min-height: 100vh; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
      .dragbar {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        padding: 8px 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.045); -webkit-app-region: drag;
      }
      .dragbar .actions, .dragbar button, .dragbar label { -webkit-app-region: no-drag; }
      .label { font-size: 11px; letter-spacing: 0.08em; opacity: 0.72; text-transform: uppercase; }
      .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      button { appearance: none; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.06); color: inherit; border-radius: 999px; padding: 8px 12px; cursor: pointer; }
      .card {
        border: 1px solid rgba(255,255,255,0.12); border-radius: 22px;
        background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.02));
        box-shadow: 0 18px 40px rgba(0,0,0,0.35); overflow: hidden;
      }
      .hero { padding: 14px; display: grid; gap: 12px; }
      .head { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
      .pill { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 6px 10px; font-size: 11px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); }
      .visual { min-height: 220px; border-radius: 18px; background: radial-gradient(circle at 50% 25%, rgba(110,231,255,0.24), transparent 32%), linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
      .visual img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .fallback { width: 116px; height: 116px; border-radius: 999px; display: none; place-items: center; font-size: 38px; font-weight: 800; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.08); }
      .title { font-size: 24px; font-weight: 800; line-height: 1.1; }
      .bodyText { font-size: 14px; line-height: 1.45; opacity: 0.92; }
      .foot { font-size: 12px; opacity: 0.68; }
      .chips { display: flex; gap: 8px; flex-wrap: wrap; }
      .chips span { border-radius: 999px; padding: 6px 10px; font-size: 11px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); }
      .tone-good { border-color: rgba(94,201,111,0.28); background: rgba(94,201,111,0.16); }
      .tone-warn { border-color: rgba(255,197,61,0.28); background: rgba(255,197,61,0.16); }
      .tone-bad { border-color: rgba(255,111,97,0.28); background: rgba(255,111,97,0.16); }
      .tone-muted { border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="dragbar">
        <div>
          <div class="label">FairlyOdd native companion</div>
          <div id="barTitle" style="font-weight:800">Homie</div>
        </div>
        <div class="actions">
          <label style="font-size:12px; opacity:0.82; display:flex; gap:6px; align-items:center;"><input id="pinToggle" type="checkbox" /> top</label>
          <button id="focusBtn">Focus</button>
          <button id="closeBtn">Close</button>
        </div>
      </div>
      <div class="card hero">
        <div class="head">
          <div>
            <div class="label">Homie state</div>
            <div id="title" class="title">Homie companion</div>
          </div>
          <div id="modePill" class="pill tone-muted">idle</div>
        </div>
        <div class="visual">
          <img id="homieImg" src="./homie-memoji.png" alt="Homie" />
          <div id="imgFallback" class="fallback">H</div>
        </div>
        <div class="chips">
          <span id="pairPill">BTCUSDT</span>
          <span id="gradePill">A</span>
          <span id="lanePill">25X</span>
        </div>
        <div id="body" class="bodyText">Waiting for companion state…</div>
        <div id="footer" class="foot">Native second-screen window ready.</div>
      </div>
    </div>
    <script>
      const els = {
        barTitle: document.getElementById('barTitle'), title: document.getElementById('title'), modePill: document.getElementById('modePill'),
        pairPill: document.getElementById('pairPill'), gradePill: document.getElementById('gradePill'), lanePill: document.getElementById('lanePill'),
        body: document.getElementById('body'), footer: document.getElementById('footer'), img: document.getElementById('homieImg'), fallback: document.getElementById('imgFallback'), pin: document.getElementById('pinToggle')
      };
      const toneClass = (tone) => tone === 'good' ? 'tone-good' : tone === 'warn' ? 'tone-warn' : tone === 'bad' ? 'tone-bad' : 'tone-muted';
      function applyState(state){
        const s = state || {};
        const title = s.title || 'Homie companion';
        const mode = s.mode || 'idle';
        const tone = s.tone || 'muted';
        els.barTitle.textContent = s.windowTitle || 'Homie';
        els.title.textContent = title;
        els.modePill.textContent = mode;
        els.modePill.className = 'pill ' + toneClass(tone);
        els.pairPill.textContent = s.symbol || 'BTCUSDT';
        els.gradePill.textContent = s.grade || 'A';
        els.lanePill.textContent = s.leverageLane || '25X';
        els.body.textContent = s.body || 'Waiting for companion state…';
        els.footer.textContent = s.footer || 'Native second-screen window ready.';
        els.pin.checked = !!s.pinTop;
        const imgSrc = (typeof s.imageSrc === 'string' && /^(data:|https?:|file:)/i.test(s.imageSrc)) ? s.imageSrc : './homie-memoji.png';
        els.img.src = imgSrc;
      }
      els.img.addEventListener('error', () => { els.img.style.display = 'none'; els.fallback.style.display = 'grid'; });
      els.pin.addEventListener('change', async () => {
        try { await window.__ODD__?.setHomieCompanionAlwaysOnTop?.(els.pin.checked); } catch {}
      });
      document.getElementById('focusBtn').addEventListener('click', async () => { try { await window.__ODD__?.focusHomieCompanion?.(); } catch {} window.focus(); });
      document.getElementById('closeBtn').addEventListener('click', async () => { try { await window.__ODD__?.closeHomieCompanion?.(); } catch {} window.close(); });
      (async () => {
        try {
          const state = await window.__ODD__?.getHomieCompanionState?.();
          applyState(state || {});
          window.__ODD__?.onHomieCompanionState?.((next) => applyState(next || {}));
        } catch {
          applyState({ title: 'Homie companion', body: 'Native companion bridge is not ready yet.', footer: 'Apply the v10.25.55 native window patch script and restart desktop mode.' });
        }
      })();
    </script>
  </body>
</html>
